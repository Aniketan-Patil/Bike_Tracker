{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}BikeTracker{% endblock %}</title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* BACKGROUND IMAGE */
        body {
            background: url("{% static 'images/background.jpg' %}") no-repeat center center fixed;
            background-size: cover;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        /* MAIN CONTENT WRAPPER */
        .main-content {
            min-height: 100vh;
            padding: 20px;
        }

        /* CONTAINER FIX */
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        /* FORM + DASHBOARD BOX */
        .form-container,
        .dashboard-container,
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
        }

        /* TOP BAR FIX */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            padding: 15px 20px;
        }

        /* BUTTON GENERAL */
        a {
            text-decoration: none;
        }

    </style>
</head>

<body>

    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
